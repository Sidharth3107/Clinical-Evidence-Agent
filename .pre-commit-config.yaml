# Secret-scanning + safety pre-commit hooks for this repo.
# Enable once:  pip install pre-commit && pre-commit install
# After that it runs automatically on every `git commit`.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks            # scans staged diffs for API keys / tokens / secrets
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key  # blocks committing a private key
      - id: check-added-large-files
        args: ["--maxkb=2048"]  # don't accidentally commit a model/data blob
